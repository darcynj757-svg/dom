kind = "video"
previewPath = "/house-build-video/"
title = "Строительство дома — видео"
version = "1.0.0"
id = "artifacts/house-build-video"
router = "path"

[[services]]
name = "web"
paths = [ "/house-build-video/" ]
localPort = 25944

[services.development]
run = "pnpm --filter @workspace/house-build-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/house-build-video", "run", "build" ]
serve = "static"
publicDir = "artifacts/house-build-video/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25944"
BASE_PATH = "/house-build-video/"
